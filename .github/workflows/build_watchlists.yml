name: Build TradingView Watchlists

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 UTC 01:00 = 日本時間 10:00
  workflow_dispatch:

jobs:
  build-watchlists:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx yahoo-finance2

      - name: Build watchlists
        run: node build_watchlists_all_in_one.js

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TradingView watchlists"
            git push
          fi
