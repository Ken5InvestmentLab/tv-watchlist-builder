name: Build TradingView Watchlists

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 UTC 01:00 = 日本時間 10:00
  workflow_dispatch:

jobs:
  build-watchlists:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx yahoo-finance2

      - name: Build watchlists
        run: node build_watchlists_all_in_one.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tradingview-watchlists
          path: |
            tradingview_tse_top2000_by_1y_avg_volume_*.txt
            tradingview_tse_top2000_by_1y_avg_volume.csv
          if-no-files-found: error
          retention-days: 30
