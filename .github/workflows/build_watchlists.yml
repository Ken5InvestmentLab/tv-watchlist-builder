name: Build TradingView Watchlists

on:
  workflow_dispatch:

concurrency:
  group: build-tradingview-watchlists
  cancel-in-progress: true

jobs:
  build-watchlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install xlsx yahoo-finance2

      - name: Build watchlists
        run: node build_watchlists_all_in_one.js

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TradingView watchlists"
            git push
          fi

      - name: Trigger TradingView Update (API)
        if: success()
        run: |
          curl --fail --silent --show-error -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            https://api.github.com/repos/Ken5InvestmentLab/tv-watchlist-updater/dispatches \
            -d '{"event_type": "build_complete"}'

      - name: Notify Discord on Success
        if: success()
        run: |
          payload='{
            "username": "TradingView Alert",
            "content": "🟢 **[System] Watchlist Build Success**",
            "embeds": [{
              "title": "Build Completed",
              "description": "最新の銘柄リストが正常に生成されました。TradingViewの更新を開始します。",
              "color": 65280
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_URL_1 }}" "DISCORD_WEBHOOK_URL_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_URL_2 }}" "DISCORD_WEBHOOK_URL_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord notifications failed, but workflow will continue."
          fi

      - name: Notify Discord on Failure
        if: failure()
        run: |
          payload='{
            "username": "TradingView Alert",
            "content": "🔴 **[System] Watchlist Build Error**",
            "embeds": [{
              "title": "Build Error Log",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "銘柄リストの自動生成中にエラーが発生しました。",
              "color": 16711680
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord failure notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_URL_1 }}" "DISCORD_WEBHOOK_URL_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_URL_2 }}" "DISCORD_WEBHOOK_URL_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord failure notifications failed."
          fi
