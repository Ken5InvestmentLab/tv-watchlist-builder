name: Build TradingView Watchlists

on:
  schedule:
    - cron: '16 00 * * *'   # 毎日 UTC 00:16 = 日本時間 09:16
  workflow_dispatch:

jobs:
  build-watchlists:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx yahoo-finance2

      - name: Build watchlists
        run: node build_watchlists_all_in_one.js

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TradingView watchlists"
            git push
          fi

      - name: Notify Discord on Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "TradingView Alert",
                 "content": "🔴 **[System] Watchlist Build Error**",
                 "embeds": [{
                   "title": "Build Error Log",
                   "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                   "description": "銘柄リストの自動生成中にエラーが発生しました。JPXの仕様変更やAPI制限の可能性があります。",
                   "color": 16711680
                 }]
               }' ${{ secrets.DISCORD_WEBHOOK_URL }}
