name: Auto Fix on Build Failure

on:
  workflow_run:
    workflows: ["Build TradingView Watchlists"]
    types: [completed]

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/

      - name: Collect failure context
        id: failure_context
        run: |
          echo "=== Workflow Run Info ===" > failure_context.txt
          echo "Run ID: ${{ github.event.workflow_run.id }}" >> failure_context.txt
          echo "Run URL: ${{ github.event.workflow_run.html_url }}" >> failure_context.txt
          echo "Triggered by: ${{ github.event.workflow_run.event }}" >> failure_context.txt
          echo "Head branch: ${{ github.event.workflow_run.head_branch }}" >> failure_context.txt
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}" >> failure_context.txt
          echo "" >> failure_context.txt

          echo "=== Downloaded Artifacts ===" >> failure_context.txt
          if [ -d artifacts ]; then
            find artifacts -type f | head -50 >> failure_context.txt
            echo "" >> failure_context.txt

            # Include log files
            echo "=== Log Files ===" >> failure_context.txt
            find artifacts -name "*.log" | while read f; do
              echo "--- $f ---" >> failure_context.txt
              tail -200 "$f" >> failure_context.txt
              echo "" >> failure_context.txt
            done

            # Include summary JSON
            echo "=== Summary JSON ===" >> failure_context.txt
            find artifacts -name "*summary.json" | while read f; do
              echo "--- $f ---" >> failure_context.txt
              cat "$f" >> failure_context.txt
              echo "" >> failure_context.txt
            done

            # Include failures JSON
            echo "=== Failures JSON ===" >> failure_context.txt
            find artifacts -name "*failures.json" | while read f; do
              echo "--- $f ---" >> failure_context.txt
              cat "$f" >> failure_context.txt
              echo "" >> failure_context.txt
            done
          else
            echo "No artifacts found." >> failure_context.txt
          fi

          echo "=== Current Source Code ===" >> failure_context.txt
          cat build_watchlists_all_in_one.js >> failure_context.txt

          echo "failure_context_file=failure_context.txt" >> $GITHUB_OUTPUT

      - name: Run Claude autofix
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch_prefix: autofix
          commit_message: "fix: 自動修復 - ビルド失敗の解消"
          pull_request_title: "[AutoFix] ビルド失敗の自動修復"
          direct_prompt: |
            ビルドワークフロー「Build TradingView Watchlists」が失敗しました。
            以下の失敗情報を分析し、`build_watchlists_all_in_one.js` を修正してください。

            失敗情報ファイル: failure_context.txt

            ## 分析と修正の手順

            1. failure_context.txt を読んで失敗の根本原因を特定する
            2. `build_watchlists_all_in_one.js` の該当箇所を特定する
            3. 最小限の変更で問題を修正する
            4. 修正内容と理由をPRの説明に記載する

            ## 修正の方針

            - APIのレート制限エラー → バッチサイズ縮小・スリープ時間延長
            - ネットワークエラー → リトライロジックの強化
            - データ形式の変更 → パース処理の修正
            - 型エラー・未定義参照 → 該当コードの修正

            修正が不可能または原因不明の場合は、調査結果をPRのコメントとして残してください。
